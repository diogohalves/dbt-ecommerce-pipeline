version: 2

models:
  - name: dim_customers
    description: "Dimensão de clientes com histórico agregado de pedidos."
    columns:
      - name: customer_id
        description: "Identificador único do cliente por pedido."
        tests:
          - unique
          - not_null
      - name: customer_unique_id
        description: "Identificador real do cliente."
        tests:
          - not_null
      - name: total_orders
        description: "Total de pedidos realizados pelo cliente."
        tests:
          - not_null

  - name: dim_products
    description: "Dimensão de produtos com categoria traduzida e métricas de vendas."
    columns:
      - name: product_id
        description: "Identificador único do produto."
        tests:
          - unique
          - not_null
      - name: category_en
        description: "Categoria do produto em inglês."
        tests:
          - not_null

  - name: fct_orders
    description: "Tabela fato central com pedidos, pagamentos e conversão cambial."
    columns:
      - name: order_id
        description: "Identificador único do pedido."
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Identificador do cliente."
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id
      - name: status
        description: "Status do pedido."
        tests:
          - not_null
      - name: gross_value_brl
        description: "Valor bruto do pedido em BRL."
        tests:
          - not_null

  - name: fct_orders_incremental
    description: "Versão incremental da fct_orders."
    columns:
      - name: order_id
        description: "Identificador único do pedido."
        tests:
          - unique
          - not_null
      - name: loaded_at
        description: "Timestamp de quando o registro foi carregado pelo dbt."
        tests:
          - not_null